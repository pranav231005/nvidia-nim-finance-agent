name: Daily Financial Analysis Agent

on:
  schedule:
    # Runs at 18:30 UTC (which is 12:00 AM IST exactly) every day
    - cron: '30 18 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Financial Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TICKERS: ${{ secrets.TICKERS }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
        TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        TWILIO_WHATSAPP_SENDER: ${{ secrets.TWILIO_WHATSAPP_SENDER }}
        WHATSAPP_RECEIVER: ${{ secrets.WHATSAPP_RECEIVER }}
      run: python agent.py

    - name: Upload PDF Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-financial-report
        path: "*.pdf"
        retention-days: 7
